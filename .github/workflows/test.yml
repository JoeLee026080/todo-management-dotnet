name: Run Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore TodoManagement.sln

      - name: Build solution
        run: dotnet build TodoManagement.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test TodoManagement.sln --configuration Release --no-build